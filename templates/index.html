<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricsAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="noise"></div>

    <div class="glow glow--1"></div>
    <div class="glow glow--2"></div>

    <div class="app">

        <header class="header">
            <a href="/" class="logo">
                <div class="logo__mark">
                    <svg viewBox="0 0 32 32" fill="none">
                        <rect width="32" height="32" rx="8" fill="url(#g)"/>
                        <path d="M12 22V11l10-2.5v11" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9.5" cy="22" r="2.5" fill="#fff"/>
                        <circle cx="19.5" cy="19.5" r="2.5" fill="#fff"/>
                        <defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ef4444"/></linearGradient></defs>
                    </svg>
                </div>
                <span class="logo__text">LyricsAtlas</span>
            </a>
        </header>

        <section class="hero">
            <h1 class="hero__title">Find songs by<br><span>their lyrics</span></h1>
            <p class="hero__sub">Search any word or phrase, filter by country and genre</p>
        </section>

        <form id="searchForm" class="search">
            <div class="search__main">
                <div class="search__input-wrap">
                    <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="lyricsInput" class="search__input" type="text" placeholder='Try "eyes", "fire", "love me tonight"' autocomplete="off">
                </div>
                <button type="submit" id="searchBtn" class="search__btn">
                    <span id="searchBtnText">Search</span>
                    <span id="searchBtnLoading" class="hidden">
                        <svg class="spin" viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".2"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
                        <span>Searching…</span>
                    </span>
                </button>
            </div>
            <div class="search__filters">
                <div class="pill-select">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>
                    <select id="countrySelect"><option value="">Select country...</option></select>
                </div>
                <div class="pill-select">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg>
                    <select id="genreSelect"><option value="">Select genre...</option></select>
                </div>
            </div>
        </form>

        <div id="statusMessage" class="status hidden"></div>
        <p id="filterNotice" class="filter-tag hidden"></p>

        <div id="resultsInfo" class="bar hidden">
            <div class="bar__left">
                <span id="resultsQuery" class="bar__query"></span>
                <span class="bar__count"><strong id="resultsCount">0</strong> results</span>
            </div>
            <button id="clearBtn" class="bar__clear">Clear</button>
        </div>

        <div id="resultsGrid" class="grid"></div>

        <div id="emptyState" class="empty">
            <div class="empty__bars">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p class="empty__title">Your results will appear here</p>
            <p class="empty__hint">Enter lyrics above and hit search</p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
